sensors:
  - point_cloud_sensor

point_cloud_sensor:
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
  point_cloud_topic: /camera/depth/points
  point_cloud_frame: depth_cam_l_optical
  max_range: 4.0
  point_subsample: 1
  padding_offset: 0.03
  padding_scale: 1.0
  filtered_cloud_topic: /filtered_cloud
  max_update_rate: 10.0
